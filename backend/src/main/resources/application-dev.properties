# ConfiguraÁıes de Banco de Dados
spring.datasource.url=jdbc:postgresql://localhost:5432/vapt_vupt_dev
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ConfiguraÁıes do Flyway (Repita aqui para garantir)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG

# Adicione isso junto com as outras configuraÁıes do Flyway
spring.flyway.url=jdbc:postgresql://localhost:5432/vapt_vupt_dev
spring.flyway.user=root
spring.flyway.password=password
